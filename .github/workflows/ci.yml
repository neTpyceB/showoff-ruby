name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint
        run: bundle exec rubocop

      - name: Test
        run: bundle exec rspec

      - name: Build image
        run: docker compose build

      - name: Docker smoke
        run: docker compose run --rm app search --path spec/fixtures/smoke --query alpha

      - name: Docker DSL smoke
        run: docker compose run --rm --entrypoint bundle app exec bin/dsl_builder run --file spec/fixtures/dsl/smoke.rb --task build
