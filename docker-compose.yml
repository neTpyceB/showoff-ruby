services:
  app:
    build: .
    environment:
      REDIS_URL: redis://cache:6379/0
      XDG_CACHE_HOME: /workspace/.tmp/cache
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - .:/workspace
    working_dir: /workspace
  cache:
    image: redis:8.6.2
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      retries: 30
      timeout: 2s
  db:
    image: postgres:18.3
    environment:
      POSTGRES_DB: showoff_ruby_development
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d showoff_ruby_development
      interval: 2s
      retries: 30
      timeout: 2s
    ports:
      - '5432:5432'
    tmpfs:
      - /var/lib/postgresql
  rest_api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/showoff_ruby_development
      JWT_SECRET: development-secret
      PORT: 3000
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - sh
      - -lc
      - bundle exec ruby bin/rest_api_migrate && bundle exec ruby bin/rest_api_service
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
    working_dir: /workspace
  high_performance:
    build: .
    depends_on:
      cache:
        condition: service_healthy
    environment:
      PORT: 9494
      PUMA_MAX_THREADS: 8
      PUMA_MIN_THREADS: 1
      REDIS_URL: redis://cache:6379/0
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/high_performance_service
    ports:
      - '9494:9494'
    volumes:
      - .:/workspace
    working_dir: /workspace
  microservices_auth:
    build: .
    environment:
      PORT: 9596
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/microservices_auth
    volumes:
      - .:/workspace
    working_dir: /workspace
  microservices_gateway:
    build: .
    depends_on:
      - microservices_auth
      - microservices_user
      - microservices_worker
    environment:
      AUTH_SERVICE_URL: http://microservices_auth:9596
      PORT: 9595
      USER_SERVICE_URL: http://microservices_user:9597
      WORKER_SERVICE_URL: http://microservices_worker:9598
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/microservices_gateway
    ports:
      - '9595:9595'
    volumes:
      - .:/workspace
    working_dir: /workspace
  microservices_user:
    build: .
    environment:
      PORT: 9597
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/microservices_user
    volumes:
      - .:/workspace
    working_dir: /workspace
  microservices_worker:
    build: .
    environment:
      PORT: 9598
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/microservices_worker
    volumes:
      - .:/workspace
    working_dir: /workspace
  realtime_collaboration:
    build: .
    environment:
      PORT: 9393
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/realtime_collaboration
    ports:
      - '9393:9393'
    volumes:
      - .:/workspace
    working_dir: /workspace
  web_framework:
    build: .
    environment:
      PORT: 9292
      XDG_CACHE_HOME: /workspace/.tmp/cache
    entrypoint:
      - bundle
      - exec
      - bin/lightweight_web_framework
    ports:
      - '9292:9292'
    volumes:
      - .:/workspace
    working_dir: /workspace
